<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Schedule</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

h1{
margin-bottom:5px;
}

#today{
font-size:22px;
margin-bottom:20px;
}

table{
margin:auto;
border-collapse:collapse;
background:white;
}

td,th{
border:1px solid #ccc;
padding:10px 18px;
font-size:18px;
}

th{
background:#eee;
}

#nextClass{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

canvas{
margin-top:30px;
border-radius:50%;
}

</style>

</head>

<body>

<h1>Today's Classes</h1>
<div id="today"></div>

<table id="scheduleTable">
<tr>
<th>Period</th>
<th>Class</th>
</tr>
</table>

<div id="nextClass"></div>

<canvas id="clock" width="260" height="260"></canvas>

<script>

// SCHEDULE

const schedule = {

Monday:[
null,
"6-4 English",
"6-3 English",
"6-1 English",
"6-2 English",
null
],

Tuesday:[
"Unavailable",
"Unavailable",
"Unavailable",
"Unavailable",
"Unavailable",
"Unavailable"
],

Wednesday:[
null,
"6-5 English",
"6-6 English",
"6-7 English",
"6-8 English",
null
],

Thursday:[
"5-6 English",
"5-5 English",
"5-4 English",
"5-1 English",
"5-2 English",
null
],

Friday:[
"5-3 English",
"5-7 English",
"5-8 English",
"5-9 English",
null,
null
]

};


// PERIOD TIMES

const periods=[

{start:"09:00",end:"09:40"},
{start:"09:50",end:"10:30"},
{start:"10:40",end:"11:20"},
{start:"12:20",end:"13:00"},
{start:"13:10",end:"13:50"},
{start:"14:00",end:"14:40"}

];


// HOLIDAYS

const holidays=[
"2026-03-01",
"2026-05-05",
"2026-06-06"
];


// DATE INFO

const now=new Date();
const day=now.toLocaleDateString("en-US",{weekday:"long"});
const todayISO=now.toISOString().split("T")[0];

const todayText=document.getElementById("today");
const table=document.getElementById("scheduleTable");
const nextDiv=document.getElementById("nextClass");


// HOLIDAY CHECK

if(holidays.includes(todayISO)){

todayText.innerHTML="Holiday 🇰🇷";

}else{

todayText.innerHTML=day;

const todaySchedule=schedule[day];

if(todaySchedule){

todaySchedule.forEach((cls,i)=>{

let row=document.createElement("tr");

let p=document.createElement("td");
p.innerText=(i+1)+"교시";

let c=document.createElement("td");
c.innerText=cls || "-";

row.appendChild(p);
row.appendChild(c);
table.appendChild(row);

});

}

}


// TIME HELPERS

function toMinutes(t){

let [h,m]=t.split(":");
return parseInt(h)*60+parseInt(m);

}


// CURRENT / NEXT CLASS

let current=null;
let next=null;

let nowMinutes=now.getHours()*60+now.getMinutes();

periods.forEach((p,i)=>{

let start=toMinutes(p.start);
let end=toMinutes(p.end);

if(nowMinutes>=start && nowMinutes<=end){

current=i;

}

if(nowMinutes<start && next===null){

next=i;

}

});

if(current!==null){

nextDiv.innerHTML="Current: Period "+(current+1);

}else if(next!==null){

nextDiv.innerHTML="Next: Period "+(next+1)+" at "+periods[next].start;

}else{

nextDiv.innerHTML="School Day Finished";

}



// CLOCK

const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");

function drawClock(){

let now=new Date();

let h=now.getHours();
let m=now.getMinutes();
let s=now.getSeconds();

let nowMin=h*60+m+s/60;

ctx.clearRect(0,0,260,260);


// BLACK FACE

ctx.beginPath();
ctx.arc(130,130,120,0,Math.PI*2);
ctx.fillStyle="black";
ctx.fill();


// TICKS

ctx.strokeStyle="white";
ctx.lineWidth=2;

for(let i=0;i<60;i++){

let angle=(i*Math.PI*2)/60;

let inner=100;
let outer=110;

if(i%5===0) inner=90;

let x1=130+inner*Math.sin(angle);
let y1=130-inner*Math.cos(angle);

let x2=130+outer*Math.sin(angle);
let y2=130-outer*Math.cos(angle);

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.stroke();

}


// FIND CLASS OR BREAK

let activeStart=null;
let activeEnd=null;
let color="blue";

for(let i=0;i<periods.length;i++){

let start=toMinutes(periods[i].start);
let end=toMinutes(periods[i].end);

if(nowMin>=start && nowMin<=end){

activeStart=start;
activeEnd=end;
color="red";
break;

}

if(i<periods.length-1){

let breakStart=end;
let breakEnd=toMinutes(periods[i+1].start);

if(nowMin>breakStart && nowMin<breakEnd){

activeStart=breakStart;
activeEnd=breakEnd;
color="blue";
break;

}

}

}


// COUNTDOWN RING

if(activeStart!==null){

let total=activeEnd-activeStart;
let remain=activeEnd-nowMin;

let percent=remain/total;

let endAngle=-Math.PI/2 + percent*(Math.PI*2);

ctx.beginPath();
ctx.arc(130,130,105,-Math.PI/2,endAngle);

ctx.strokeStyle=color;
ctx.lineWidth=10;
ctx.stroke();

}


// HANDS

let hour=(h%12)+m/60;
let hourAngle=hour*Math.PI/6;

let minAngle=(m+s/60)*Math.PI/30;

ctx.strokeStyle="white";

ctx.lineWidth=4;

ctx.beginPath();
ctx.moveTo(130,130);
ctx.lineTo(
130+60*Math.sin(hourAngle),
130-60*Math.cos(hourAngle)
);
ctx.stroke();

ctx.lineWidth=3;

ctx.beginPath();
ctx.moveTo(130,130);
ctx.lineTo(
130+90*Math.sin(minAngle),
130-90*Math.cos(minAngle)
);
ctx.stroke();


// DIGITAL TIME

ctx.fillStyle="white";
ctx.font="20px monospace";
ctx.textAlign="center";

let timeString=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

ctx.fillText(timeString,130,140);

}

setInterval(drawClock,1000);

</script>

</body>
</html>
