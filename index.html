<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Schedule</title>
<style>
body{
  font-family:Arial;
  background:#f2f2f2;
  text-align:center;
  padding:20px;
}
h1{margin-bottom:5px;}
#today{font-size:22px;margin-bottom:20px;}
table{margin:auto;border-collapse:collapse;background:white;}
td,th{border:1px solid #ccc;padding:10px 18px;font-size:18px;}
th{background:#eee;}
#nextClass{margin-top:20px;font-size:22px;font-weight:bold;}
#clockTitle{font-size:20px;margin-top:20px;font-weight:bold;}
canvas{margin-top:10px;border-radius:50%;}
</style>
</head>
<body>

<h1>Today's Classes</h1>
<div id="today"></div>

<table id="scheduleTable">
<tr><th>Period</th><th>Class</th></tr>
</table>

<div id="nextClass"></div>

<div id="clockTitle"></div>

  Monday:[null,"6-4 English","6-3 English","6-1 English","6-2 English",null],
  Tuesday:["Unavailable","Unavailable","Unavailable","Unavailable","Unavailable","Unavailable"],

  Friday:["5-3 English","5-7 English","5-8 English","5-9 English",null,null]
};

    {type:"break",start:"13:50",end:"14:00"},

    {type:"break",start:"11:20",end:"12:20"},
    {type:"class",label:"4th Period",start:"12:20",end:"13:00"},
    {type:"lunch",label:"Lunch",start:"13:00",end:"13:10"},
    {type:"class",label:"5th Period",start:"13:10",end:"13:50"},
    {type:"break",start:"13:50",end:"14:00"},
    {type:"class",label:"6th Period",start:"14:00",end:"14:40"}
  ]
};

// HOLIDAYS
const holidays=["2026-03-01","2026-05-05","2026-06-06"];

// DATE
const now=new Date();
const day=now.toLocaleDateString("en-US",{weekday:"long"});
const todayISO=now.toISOString().split("T")[0];

const todayText=document.getElementById("today");
const table=document.getElementById("scheduleTable");
const nextDiv=document.getElementById("nextClass");
const clockTitle=document.getElementById("clockTitle");

// HOLIDAY
if(holidays.includes(todayISO)){
  todayText.innerHTML="Holiday 🇰🇷";
}else{
  todayText.innerHTML=day;
}

// BUILD TABLE
const todaySchedule=schedule[day];
if(todaySchedule){
  todaySchedule.forEach((cls,i)=>{
    let row=document.createElement("tr");
    let p=document.createElement("td");
    p.innerText=(i+1)+"교시";
    let c=document.createElement("td");
    c.innerText=cls || "-";
    row.appendChild(p);
    row.appendChild(c);
    table.appendChild(row);
  });
}

// TIME HELPER
function toMinutes(t){
  let [h,m]=t.split(":");
  return parseInt(h)*60+parseInt(m);
}

const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");

function drawClock(){
  let now=new Date();
  let h=now.getHours();
  let m=now.getMinutes();
  let s=now.getSeconds();
  let nowMin=h*60+m+s/60;

  ctx.clearRect(0,0,260,260);

  // face
  ctx.beginPath();
  ctx.arc(130,130,120,0,Math.PI*2);
  ctx.fillStyle="black";
  ctx.fill();

  let blocks=timeBlocks[day];
  let active=null;
  if(blocks){
    for(let b of blocks){
      let start=toMinutes(b.start);
      let end=toMinutes(b.end);
      if(nowMin>=start && nowMin<=end){
        active=b;
        break;
      }
    }
  }

  if(active){
    if(active.type==="class") color="red";
    if(active.type==="break") color="blue";
    if(active.type==="lunch") color="yellow";
