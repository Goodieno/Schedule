<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Timer</title>

<style>
/* ================= COUNTDOWN RING PULSE ================= */
@keyframes ringPulseRed{
0%{filter:drop-shadow(0 0 3px rgba(255,60,60,.6));}
50%{filter:drop-shadow(0 0 18px rgba(255,60,60,1));}
100%{filter:drop-shadow(0 0 3px rgba(255,60,60,.6));}
}
@keyframes ringPulseBlue{
0%{filter:drop-shadow(0 0 3px rgba(70,150,255,.6));}
50%{filter:drop-shadow(0 0 18px rgba(70,150,255,1));}
100%{filter:drop-shadow(0 0 3px rgba(70,150,255,.6));}
}
@keyframes ringPulseGray{
0%{filter:drop-shadow(0 0 3px rgba(180,180,180,.5));}
50%{filter:drop-shadow(0 0 12px rgba(220,220,220,.9));}
100%{filter:drop-shadow(0 0 3px rgba(180,180,180,.5));}
}
.pulseClass{animation:ringPulseRed 2s infinite ease-in-out;}
.pulseBreak{animation:ringPulseBlue 2s infinite ease-in-out;}
.pulseLunch{animation:ringPulseRed 2s infinite ease-in-out;}
.pulseFree{animation:ringPulseGray 2s infinite ease-in-out;}

/* ================= CURRENT CLASS HIGHLIGHT ================= */
.currentClass{
background:#1f3a5f;
box-shadow:0 0 15px rgba(0,150,255,0.6);
font-weight:bold;
transition:all .3s ease;
}

/* Small period time on hover/touch */
.periodTime {
  font-size: 10px;
  color: #aaa;
  margin-right: 5px;
  display: none;
}

#scheduleTable td:hover .periodTime,
#scheduleTable td:active .periodTime {
  display: inline;
}

/* ================= THEME ================= */
body{
background:#0b1626;
font-family:Arial;
color:white;
text-align:center;
margin:0;
padding:20px;
}
h2{margin:10px 0;cursor:pointer;}
#clockBox{margin:auto;width:320px;}
canvas{background:#1f3a5f;border-radius:50%;box-shadow:0 0 20px rgba(0,140,255,.4);}
#periodLabel{font-size:22px;font-weight:bold;margin-top:10px;}
#info{margin-top:20px;font-size:18px;}
#weather,#air{font-weight:bold;margin-top:5px;}
table{margin:auto;margin-top:20px;border-collapse:collapse;width:95%;max-width:400px;}
th,td{padding:10px;border-bottom:1px solid #333;}
th{color:#9cc9ff;}
.activeRowClass{background:rgba(255,0,0,.25);}
.activeRowLunch{background:rgba(255,255,0,.35);}
.lunchText{color:red;font-weight:bold;}

/* WEEK POPUP */
#weekPopup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

#weekBox {
  background: #3a3f45;
  padding: 20px;
  border-radius: 12px;
  width: 95%;
  max-width: 600px;
  color: #e0e0e0;
}

#weekBox h3 {
  margin-top: 0;
  text-align: left;
  color: #ffffff;
}

#weekTable {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
}

#weekTable th {
  background: #50555c;
  color: #ffffff;
  padding: 8px;
}

#weekTable td {
  padding: 10px;
  border-top: 1px solid #666;
  color: #e0e0e0;
}

.lunchRed {
  color: #ff6b6b;
  font-size: 12px;
  font-weight: bold;
}

.lunchPurple {
  color: #b085ff;
  font-size: 12px;
  font-weight: bold;
}
</style>
</head>

<script>
const API_KEY="fa9fe37b9be14839fe6774643939e974";

/* ================= SCHEDULE ================= */
const schedule = {
  Monday: [null, "6-4 English", "6-3 English", "6-1 English", "6-2 English", null],
  Tuesday: ["Unavailable", "Unavailable", "Unavailable", "Unavailable", "Unavailable", "Unavailable"],
  Wednesday: [null, "6-5 English", "6-6 English", "6-7 English", "6-8 English", null],
  Thursday: ["5-6 English", "5-5 English", "5-4 English", "5-1 English", "5-2 English", null],
  Friday: ["5-3 English", "5-7 English", "5-8 English", "5-9 English", null, null]
};

/* ================= DATE (REAL-TIME) ================= */
const now = new Date();
const today = now.toLocaleDateString('en-US', { weekday: 'long' });
document.getElementById("today").textContent = today;

/* ================= BUILD TABLE ================= */
const table = document.getElementById("scheduleTable");
const dailyBlocks = {
  Monday: [
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "lunch", label: "점심시간", start: "11:20", end: "12:20" },
    { type: "class", label: "4교시", start: "12:20", end: "13:00" },
    { type: "break", start: "13:00", end: "13:10" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" }
  ],
  Wednesday: [
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "lunch", label: "점심시간", start: "11:20", end: "12:20" },
    { type: "class", label: "4교시", start: "12:20", end: "13:00" },
    { type: "break", start: "13:00", end: "13:10" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" }
  ],
  Thursday: [
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "class", label: "4교시", start: "11:20", end: "12:00" },
    { type: "lunch", label: "점심시간", start: "12:00", end: "13:00" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" }
  ],
  Friday: [
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "class", label: "4교시", start: "11:20", end: "12:00" },
    { type: "lunch", label: "점심시간", start: "12:00", end: "13:00" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" }
  ]
};

const blocks = dailyBlocks[today];

if (!blocks) {
  const row = document.createElement("tr");
  const titleP = document.createElement("td");
  titleP.textContent = "WEEKEND";

  const contentC = document.createElement("td");
  contentC.style.display = "flex";
  contentC.style.alignItems = "center";
  contentC.style.justifyContent = "center";
  contentC.style.gap = "15px";

  const textSpan = document.createElement("span");
  textSpan.textContent = "FREEdom 😊 🥳 ";
  textSpan.style.fontSize = "24px";
  textSpan.style.fontWeight = "bold";

  contentC.appendChild(textSpan);
  row.appendChild(titleP);
  row.appendChild(contentC);
  table.appendChild(row);
} else {
  let classIndex = 0;
  blocks.forEach((b) => {
    if (b.type === "break") return;
    let row = document.createElement("tr");
    row.dataset.start = b.start;
    row.dataset.end = b.end;
    let p = document.createElement("td");
    let timeSpan = document.createElement("span");
    timeSpan.className = "periodTime";
    timeSpan.textContent = `${b.start}-${b.end}`;
    p.appendChild(timeSpan);
    p.appendChild(document.createTextNode(b.label));
    let c = document.createElement("td");
    if (b.type === "class") {
        c.textContent = (schedule[today] || [])[classIndex] || "-";
        classIndex++;
    }
    if (b.type === "lunch") {
        c.innerHTML = '<span class="lunchText">LUNCH</span>';
    }
    row.appendChild(p);
    row.appendChild(c);
    table.appendChild(row);
  });
}

/* ================= CURRENT CLASS DETECTOR ================= */
function updateCurrentClass(){
const now=new Date(); const minutesNow=now.getHours()*60+now.getMinutes();
const rows=document.querySelectorAll("#scheduleTable tr");
rows.forEach(row=>{
const start=row.dataset.start; const end=row.dataset.end; if(!start||!end) return;
const [sh,sm]=start.split(":").map(Number); const [eh,em]=end.split(":").map(Number);
const startMin=sh*60+sm; const endMin=eh*60+em;
row.classList.remove("currentClass");
if(minutesNow>=startMin && minutesNow<endMin){ row.classList.add("currentClass"); }
});
}
setInterval(updateCurrentClass,10000);
updateCurrentClass();

/* ================= CLOCK ================= */
const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");
function toMin(t){let[h,m]=t.split(":"); return h*60+m;}
function highlightSchedule(label,type){
document.querySelectorAll("#scheduleTable tr").forEach(r=>{ r.classList.remove("activeRowClass","activeRowLunch"); });
document.querySelectorAll("#scheduleTable tr").forEach(r=>{
let td=r.querySelector("td"); if(td && td.textContent===label){
if(type==="class") r.classList.add("activeRowClass");
if(type==="lunch") r.classList.add("activeRowLunch");
}});
}
  
function drawClock(){
    let now = new Date();
    let mins = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;
    ctx.clearRect(0,0,300,300);

    /* face - 5% smaller radius (133) */
    ctx.beginPath(); 
    ctx.arc(150,150,133,0,Math.PI*2); 
    ctx.fillStyle="#1f3a5f"; 
    ctx.fill();

    /* ticks - adjusted for smaller radius (113) */
    for(let i=0;i<60;i++){
        let angle=i*Math.PI/30; 
        let len=i%5==0?15:7;
        let x1=150+Math.cos(angle)*(113-len); 
        let y1=150+Math.sin(angle)*(113-len);
        let x2=150+Math.cos(angle)*113; 
        let y2=150+Math.sin(angle)*113;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
        ctx.strokeStyle="white"; ctx.lineWidth=i%5==0?3:1; ctx.stroke();
    }
  
    let active = null;
    if (blocks) {
        for(let b of blocks){
            let s = toMin(b.start); 
            let e = toMin(b.end); 
            if(mins >= s && mins <= e){ 
                active = b; 
                break; 
            }
        }
    }

    let label = "Free Time"; 
    let color = "gray";
    let total = 0;
    let remain = 0;

    if(active){
        label = active.label;
        if(active.type==="class") color="red";
        if(active.type==="break") color="blue";
        if(active.type==="lunch") color="red";
        total = toMin(active.end) - toMin(active.start);
        remain = toMin(active.end) - mins;
        highlightSchedule(active.label, active.type);
    } else if (blocks) {
        let nextBlock = blocks.find(b => mins < toMin(b.start));
        if(nextBlock){
            label = `Free Time → ${nextBlock.label}`;
            color = "gray";
            total = toMin(nextBlock.start) - mins;
            remain = total;
        } else {
            label = "Free Time → End of Day";
            color = "gray";
            total = 1; remain = 1;
        }
    } else {
        // === WEEKEND COUNTDOWN LOGIC ===
        color = "#00d4ff"; // A nice glowing cyan for the weekend
        label = "WEEKEND FREEDOM";
        
        // Calculate the "Start" (Friday 16:30)
        let friday = new Date(now);
        let day = friday.getDay(); // 0 is Sun, 5 is Fri, 6 is Sat
        let diffToFri = (day >= 5) ? (day - 5) : (day + 2);
        friday.setDate(now.getDate() - diffToFri);
        friday.setHours(16, 30, 0, 0);

        // Calculate the "End" (Monday 08:30)
        let monday = new Date(friday);
        monday.setDate(friday.getDate() + 3);
        monday.setHours(8, 30, 0, 0);

        total = monday.getTime() - friday.getTime();
        remain = monday.getTime() - now.getTime();
        
        // Clamp values so the ring doesn't break if you're outside the window
        if (remain < 0) remain = 0;
        if (remain > total) remain = total;
    }

    /* countdown arc bordering the face (133) */
    if(total > 0){
        let percent = remain / total;
        let end = -Math.PI/2 + percent * 2 * Math.PI;
        ctx.beginPath(); 
        ctx.arc(150,150,133,-Math.PI/2,end);
        let pulse = 6 + Math.sin(Date.now()/200)*2;
        ctx.lineWidth = pulse; 
        ctx.strokeStyle = color; 
        ctx.stroke();
    }

    /* DIGITAL CLOCK */
    let h = now.getHours(); 
    let m = now.getMinutes().toString().padStart(2,"0"); 
    let s = now.getSeconds().toString().padStart(2,"0");
    let ampm = h >= 12 ? "PM" : "AM";
    h = h % 12; if(h==0) h=12;
    ctx.fillStyle="white"; 
    ctx.font="28px Arial"; 
    ctx.textAlign="center"; 
    ctx.textBaseline="middle";
    ctx.fillText(`${h}:${m}:${s} ${ampm}`, 150, 150);

    document.getElementById("periodLabel").textContent = label;
    document.getElementById("periodLabel").style.color = color;
}

/* ================= WEATHER ================= */
async function loadWeather(){
try{
const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
const geoData=await geoRes.json(); const lat=geoData[0].lat; const lon=geoData[0].lon;
const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`);
const data=await res.json();
document.getElementById("weather").textContent=`🌤 Weather: ${data.weather[0].main} / ${data.main.temp.toFixed(1)}°C`;
}catch{ document.getElementById("weather").textContent="Weather Unavailable"; }
}
loadWeather();

/* ================= AIR ================= */
async function loadAir(){
try{
const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
const geoData=await geoRes.json(); const lat=geoData[0].lat; const lon=geoData[0].lon;
const res=await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`);
const data=await res.json(); const aqi=data.list[0].main.aqi;
const levels=["Good 😊","Fair 🙂","Moderate 😐","Poor 😷","Very Poor ☠️"];
document.getElementById("air").textContent=`😷 Air Quality: ${levels[aqi-1]}`;
}catch{ document.getElementById("air").textContent="Air Quality Unavailable"; }
}
loadAir();

/* ================= POPUP ================= */
const weekPopup=document.getElementById("weekPopup");
document.getElementById("today").onclick=()=>{ weekPopup.style.display="flex"; }
weekPopup.onclick=()=>{ weekPopup.style.display="none"; }

</script>
</body>
