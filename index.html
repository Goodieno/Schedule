<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Dashboard</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:#e2e8f0;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:420px;
}

.card{
background:#1e293b;
border:1px solid #334155;
border-radius:14px;
padding:18px;
margin-bottom:18px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

h2{
margin-top:0;
font-size:20px;
}

/* CLOCK */

.clockWrap{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

canvas{
background:black;
border-radius:50%;
}

#timeLeft{
font-size:32px;
font-weight:bold;
margin-top:10px;
}

#clockLabel{
font-size:16px;
opacity:.8;
}

/* WEATHER */

.weatherRow{
display:flex;
justify-content:space-between;
font-size:18px;
}

/* SCHEDULE */

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
text-align:center;
}

th{
color:#94a3b8;
}

.activeClass{
animation:pulse 2s infinite;
border-radius:6px;
}

@keyframes pulse{

0%{box-shadow:0 0 5px #3b82f6;}
50%{box-shadow:0 0 18px #3b82f6;}
100%{box-shadow:0 0 5px #3b82f6;}

}

.weekSchedule{
display:none;
}

</style>
</head>

<body>

<div class="container">

<!-- CLOCK -->

<div class="card clockWrap">

<canvas id="clock" width="260" height="260"></canvas>

<div id="timeLeft">--:--</div>

<div id="clockLabel">Loading...</div>

</div>


<!-- WEATHER -->

<div class="card">

<h2>Weather</h2>

<div class="weatherRow">
<div id="temp">--°C</div>
<div id="weather">--</div>
</div>

<div style="margin-top:10px">
Air Quality: <span id="air">--</span>
</div>

</div>


<!-- TODAY SCHEDULE -->

<div class="card" onclick="toggleWeek()">

<h2 id="todayTitle">Today's Classes</h2>

<table id="todaySchedule"></table>

</div>


<!-- WEEK SCHEDULE -->

<div class="card weekSchedule" id="weekCard">

<h2>Weekly Schedule</h2>

<table>

<tr>
<th>교시</th>
<th>월</th>
<th>화</th>
<th>수</th>
<th>목</th>
<th>금</th>
</tr>

<tr>
<td>1</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td>5-6</td>
<td>5-3</td>
</tr>

<tr>
<td>2</td>
<td>6-4</td>
<td>-</td>
<td>6-5</td>
<td>5-5</td>
<td>5-7</td>
</tr>

<tr>
<td>3</td>
<td>6-3</td>
<td>-</td>
<td>6-6</td>
<td>5-4</td>
<td>5-8</td>
</tr>

<tr>
<td>4</td>
<td>6-1</td>
<td>-</td>
<td>6-7</td>
<td>5-1</td>
<td>5-9</td>
</tr>

<tr>
<td>5</td>
<td>6-2</td>
<td>-</td>
<td>6-8</td>
<td>5-2</td>
<td>-</td>
</tr>

</table>

</div>

</div>


<script>

/* SCHEDULE */

const schedule={
Monday:[null,"6-4 English","6-3 English","6-1 English","6-2 English",null],
Tuesday:["Unavailable","Unavailable","Unavailable","Unavailable","Unavailable","Unavailable"],
Wednesday:[null,"6-5 English","6-6 English","6-7 English","6-8 English",null],
Thursday:["5-6 English","5-5 English","5-4 English","5-1 English","5-2 English",null],
Friday:["5-3 English","5-7 English","5-8 English","5-9 English",null,null]
}

/* TIME BLOCKS */

const blocks=[

{type:"class",label:"1st Period",start:"09:00",end:"09:40"},
{type:"break",start:"09:40",end:"09:50"},

{type:"class",label:"2nd Period",start:"09:50",end:"10:30"},
{type:"break",start:"10:30",end:"10:40"},

{type:"class",label:"3rd Period",start:"10:40",end:"11:20"},
{type:"lunch",label:"Lunch",start:"11:20",end:"12:20"},

{type:"class",label:"4th Period",start:"12:20",end:"13:00"},
{type:"break",start:"13:00",end:"13:10"},

{type:"class",label:"5th Period",start:"13:10",end:"13:50"},
{type:"break",start:"13:50",end:"14:00"},

{type:"class",label:"6th Period",start:"14:00",end:"14:40"}

]

function toMin(t){

let [h,m]=t.split(":")
return parseInt(h)*60+parseInt(m)

}

/* CLOCK */

const canvas=document.getElementById("clock")
const ctx=canvas.getContext("2d")

function drawClock(){

let now=new Date()

let nowMin=now.getHours()*60+now.getMinutes()+now.getSeconds()/60

ctx.clearRect(0,0,260,260)

/* face */

ctx.beginPath()
ctx.arc(130,130,120,0,Math.PI*2)
ctx.fillStyle="black"
ctx.fill()

let active=null

for(let b of blocks){

if(nowMin>=toMin(b.start)&&nowMin<=toMin(b.end)){

active=b
break

}

}

if(active){

let total=toMin(active.end)-toMin(active.start)

let remain=toMin(active.end)-nowMin

let percent=remain/total

let angle=-Math.PI/2+(percent*Math.PI*2)

let color="red"

if(active.type==="break")color="blue"
if(active.type==="lunch")color="yellow"

ctx.beginPath()
ctx.arc(130,130,100,-Math.PI/2,angle)
ctx.lineWidth=14
ctx.strokeStyle=color
ctx.stroke()

let min=Math.floor(remain)
let sec=Math.floor((remain-min)*60)

document.getElementById("timeLeft").innerText=
min+":"+String(sec).padStart(2,"0")

document.getElementById("clockLabel").innerText=active.label

}

}

/* TODAY TABLE */

let today=new Date().toLocaleDateString("en-US",{weekday:"long"})

let todayList=schedule[today]

let table=document.getElementById("todaySchedule")

todayList.forEach((c,i)=>{

let row=document.createElement("tr")

let p=document.createElement("td")
p.innerText=(i+1)+"교시"

let cls=document.createElement("td")
cls.innerText=c||"-"

row.appendChild(p)
row.appendChild(cls)

table.appendChild(row)

})

/* WEATHER */

const API="YOUR_OPENWEATHER_API_KEY"

fetch(`https://api.openweathermap.org/data/2.5/weather?q=Dangjin&units=metric&appid=${API}`)
.then(r=>r.json())
.then(d=>{

document.getElementById("temp").innerText=Math.round(d.main.temp)+"°C"

document.getElementById("weather").innerText=d.weather[0].main

})

/* AIR */

fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=36.89&lon=126.63&appid=${API}`)
.then(r=>r.json())
.then(d=>{

let aqi=d.list[0].main.aqi

let text="Good"

if(aqi==2)text="Fair"
if(aqi==3)text="Moderate"
if(aqi==4)text="Poor"
if(aqi==5)text="Very Poor"

document.getElementById("air").innerText=text

})

/* WEEK TOGGLE */

function toggleWeek(){

let w=document.getElementById("weekCard")

w.style.display=(w.style.display=="block")?"none":"block"

}

setInterval(drawClock,1000)

drawClock()

</script>

</body>
</html>
