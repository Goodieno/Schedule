<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tapdong TV Calendar</title>

<style>

/* ================= BODY ================= */

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f1c2e;
    color:white;
}

/* ================= HEADER ================= */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    font-size:20px;
}

.info{
    display:flex;
    gap:25px;
    align-items:center;
}

.bold{
    font-weight:bold;
}

/* ================= CLOCK ================= */

#clockContainer{
    display:flex;
    justify-content:center;
    margin-top:20px;
}

canvas{
    background:#132a46;
    border-radius:50%;
}

/* ================= COUNTDOWN ================= */

#countdown{
    position:absolute;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-top:150px;
}

/* ================= SCHEDULE ================= */

#schedule{
    width:90%;
    margin:auto;
    margin-top:30px;
    border-collapse:collapse;
}

#schedule td{
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

/* ================= CURRENT CLASS GLOW ================= */

.current{
    animation:pulse 2s infinite;
}

@keyframes pulse{

0%{
box-shadow:0 0 10px #4da6ff;
}

50%{
box-shadow:0 0 25px #4da6ff;
}

100%{
box-shadow:0 0 10px #4da6ff;
}

}

</style>
</head>

<body>

<header>

<div id="date"></div>

<div class="info">

<div>
🌤 <span class="bold">Weather:</span>
<span id="weather">Loading...</span>
</div>

<div>
😷 <span class="bold">Air Quality:</span>
<span id="air">Loading...</span>
</div>

</div>

</header>

<div id="clockContainer">
<canvas id="clock" width="320" height="320"></canvas>
<div id="countdown"></div>
</div>

<table id="schedule"></table>

<script>

/* ================= API KEY ================= */

const API_KEY = "fa9fe37b9be14839fe6774643939e974";

/* ================= WEATHER (FIXED) ================= */

async function loadWeather() {

    try {

        const geoRes = await fetch(
            `https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`
        );

        const geoData = await geoRes.json();

        const lat = geoData[0].lat;
        const lon = geoData[0].lon;

        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
        );

        const data = await res.json();

        document.getElementById("weather").textContent =
            `${data.weather[0].main} / ${data.main.temp.toFixed(1)}°C`;

    } catch {

        document.getElementById("weather").textContent =
            "Unavailable";
    }
}

/* ================= AIR ================= */

async function loadAir() {

    try {

        const geoRes = await fetch(
            `https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`
        );

        const geoData = await geoRes.json();

        const lat = geoData[0].lat;
        const lon = geoData[0].lon;

        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`
        );

        const data = await res.json();

        const aqi = data.list[0].main.aqi;

        const levels = [
            "Good 😊",
            "Fair 🙂",
            "Moderate 😐",
            "Poor 😷",
            "Very Poor ☠️"
        ];

        document.getElementById("air").textContent =
            levels[aqi-1];

    } catch {

        document.getElementById("air").textContent =
            "Unavailable";
    }
}

/* ================= CLOCK ================= */

const canvas = document.getElementById("clock");
const ctx = canvas.getContext("2d");

function drawClock(){

const radius = canvas.width/2;
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.translate(radius,radius);

/* outer ring */

ctx.beginPath();
ctx.arc(0,0,radius-5,0,2*Math.PI);
ctx.strokeStyle="white";
ctx.lineWidth=4;
ctx.stroke();

/* ticks */

for(let i=0;i<60;i++){

ctx.rotate(Math.PI/30);

ctx.beginPath();

ctx.moveTo(0,-radius+10);

if(i%5==0){

ctx.lineWidth=3;
ctx.lineTo(0,-radius+25);

}else{

ctx.lineWidth=1;
ctx.lineTo(0,-radius+18);

}

ctx.strokeStyle="white";
ctx.stroke();

}

ctx.setTransform(1,0,0,1,0,0);

}

setInterval(drawClock,1000);

/* ================= DATE ================= */

function updateDate(){

const now=new Date();

document.getElementById("date").textContent=
now.toDateString();

}

setInterval(updateDate,1000);

/* ================= INIT ================= */

loadWeather();
loadAir();
updateDate();

</script>

</body>
</html>
