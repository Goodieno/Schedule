<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benjamin's Schedule</title>

<style>
/* ================= THEME & LAYOUT ================= */
body{
background:#0b1626;
font-family:Arial, sans-serif;
color:white;
text-align:center;
margin:0;
padding:20px;
overflow-x: hidden;
}
h2{margin:10px 0;cursor:pointer;}
#clockBox{margin:auto;width:320px; height:320px; display:flex; align-items:center; justify-content:center;}
canvas{background:#1f3a5f; border-radius:50%; box-shadow:0 0 20px rgba(0,140,255,.4); border: 8px solid #1f3a5f; image-rendering: -webkit-optimize-contrast;}
#periodLabel{font-size:22px;font-weight:bold;margin-top:10px;}
#info{margin-top:20px;font-size:18px;}
#weather,#air{font-weight:bold;margin-top:5px;}

#scheduleTable {
  margin: auto;
  margin-top: 20px;
  border-collapse: collapse;
  width: 95%;
  max-width: 400px;
  background: #1f3a5f;
  border-radius: 12px;
  overflow: hidden;
}
#scheduleTable th {
  background: #2a4d7d;
  color: #9cc9ff;
  padding: 12px;
}
#scheduleTable td {
  padding: 12px;
  border-bottom: 1px solid #0b1626;
}
.currentClass {
  background: #2d5a8b;
  box-shadow: inset 0 0 10px rgba(0,150,255,0.4);
  font-weight: bold;
}
.prepPeriod { color: #20b2aa !important; } 
.periodTime {
  font-size: 10px;
  color: #aaa;
  margin-right: 8px;
  display: none;
}
#scheduleTable td:hover .periodTime { display: inline; }
.lunchText{color:#ff6b6b; font-weight:bold;}

/* ================= POPUP MENU STYLE ================= */
#weekPopup {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
#weekBox {
  background: #1f3a5f;
  padding: 20px;
  border-radius: 15px;
  width: 95%;
  max-width: 650px;
  color: white;
  border: 1px solid #3d5afe;
}
#weekBox h3 {
  margin-top: 0;
  text-align: center;
  color: #9cc9ff;
  border-bottom: 1px solid #333;
  padding-bottom: 10px;
}
#weekTable {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
}
#weekTable th {
  background: #2a4d7d;
  color: #ffffff;
  padding: 10px;
  font-size: 14px;
}
#weekTable td {
  padding: 8px;
  border: 1px solid #0b1626;
  font-size: 13px;
  height: 60px;
  vertical-align: middle;
}
.lunchRed { color: #ff6b6b; font-size: 10px; font-weight: bold; display: block; margin-top: 4px; }
.lunchPurple { color: #b085ff; font-size: 10px; font-weight: bold; display: block; margin-top: 4px; }

/* ================= EMOJI RAIN ================= */
.falling-emoji {
  position: fixed;
  top: -50px;
  z-index: 9999;
  pointer-events: none;
  font-size: 24px;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>

<h2 id="today"></h2>

<div id="clockBox">
<canvas id="clock" width="300" height="300"></canvas>
</div>

<div id="periodLabel"></div>

<div id="info">
<div id="weather"> Weather Loading...</div>
<div id="air"> Air Quality Loading...</div>
</div>

<table id="scheduleTable">
<tr><th>Period</th><th>Class</th></tr>
</table>

<div id="weekPopup">
<div id="weekBox">
<h3>벤자민 (영어) 📅</h3>
<table id="weekTable">
<tr><th>교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr>
<tr><td>1교시</td><td>-</td><td>-</td><td>-</td><td>5-6 영어</td><td>5-3 영어</td></tr>
<tr><td>2교시</td><td>6-4 영어</td><td>-</td><td>6-5 영어</td><td>5-5 영어</td><td>5-7 영어</td></tr>
<tr><td>3교시</td><td>6-3 영어<br><span class="lunchRed">LUNCH 11:20</span></td><td>-</td><td>6-6 영어<br><span class="lunchRed">LUNCH 11:20</span></td><td>5-4 영어</td><td>5-8 영어</td></tr>
<tr><td>4교시</td><td>6-1 영어</td><td>-</td><td>6-7 영어</td><td>5-1 영어<br><span class="lunchPurple">LUNCH 12:10</span></td><td>5-9 영어<br><span class="lunchPurple">LUNCH 12:10</span></td></tr>
<tr><td>5교시</td><td>6-2 영어</td><td>-</td><td>6-8 영어</td><td>5-2 영어</td><td>-</td></tr>
<tr><td>6교시</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>
</table>
</div>
</div>

<script>
const API_KEY="fa9fe37b9be14839fe6774643939e974";
let currentCondition = "default"; 

const schedule = {
  Monday: [null, "6-4 English", "6-3 English", "6-1 English", "6-2 English", null],
  Wednesday: [null, "6-5 English", "6-6 English", "6-7 English", "6-8 English", null],
  Thursday: ["5-6 English", "5-5 English", "5-4 English", "5-1 English", "5-2 English", null],
  Friday: ["5-3 English", "5-7 English", "5-8 English", "5-9 English", null, null]
};

const now = new Date();
const today = now.toLocaleDateString('en-US', { weekday: 'long' });
document.getElementById("today").textContent = today;

const dailyBlocks = {
  Monday: [
    { type: "prep", label: "Morning Prep", start: "08:30", end: "09:00" },
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", label: "Break", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", label: "Break", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "lunch", label: "Lunch Time", start: "11:20", end: "12:20" },
    { type: "class", label: "4교시", start: "12:20", end: "13:00" },
    { type: "break", label: "Break", start: "13:00", end: "13:10" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", label: "Break", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" },
    { type: "prep", label: "Afternoon Office", start: "14:40", end: "16:30" }
  ],
  Wednesday: [
    { type: "prep", label: "Morning Prep", start: "08:30", end: "09:00" },
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", label: "Break", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", label: "Break", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "lunch", label: "Lunch Time", start: "11:20", end: "12:20" },
    { type: "class", label: "4교시", start: "12:20", end: "13:00" },
    { type: "break", label: "Break", start: "13:00", end: "13:10" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", label: "Break", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" },
    { type: "prep", label: "Afternoon Office", start: "14:40", end: "16:30" }
  ],
  Thursday: [
    { type: "prep", label: "Morning Prep", start: "08:30", end: "09:00" },
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", label: "Break", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", label: "Break", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "class", label: "4교시", start: "11:20", end: "12:00" },
    { type: "lunch", label: "Lunch Time", start: "12:00", end: "13:00" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", label: "Break", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" },
    { type: "prep", label: "Afternoon Office", start: "14:40", end: "16:30" }
  ],
  Friday: [
    { type: "prep", label: "Morning Prep", start: "08:30", end: "09:00" },
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", label: "Break", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", label: "Break", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "class", label: "4교시", start: "11:20", end: "12:00" },
    { type: "lunch", label: "Lunch Time", start: "12:00", end: "13:00" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", label: "Break", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" },
    { type: "prep", label: "Afternoon Office", start: "14:40", end: "16:30" }
  ]
};

const blocks = dailyBlocks[today];
const tableElem = document.getElementById("scheduleTable");
const currentMinsTotal = now.getHours() * 60 + now.getMinutes();
const isWeekendView = (today === "Saturday" || today === "Sunday") || (today === "Friday" && currentMinsTotal >= (16*60+30));

if (isWeekendView || !blocks) {
  tableElem.innerHTML = "<tr><td colspan='2' style='font-size:24px; padding:30px;'>FREEdom 😊 🥳</td></tr>";
} else {
  let classIndex = 0;
  blocks.forEach((b) => {
    if (b.type === "break") return;
    let row = document.createElement("tr");
    row.dataset.start = b.start; row.dataset.end = b.end;
    let p = document.createElement("td");
    let ts = document.createElement("span"); ts.className="periodTime"; ts.textContent=`${b.start}-${b.end}`;
    p.appendChild(ts); p.appendChild(document.createTextNode(b.label));
    let c = document.createElement("td");
    
    if (b.type === "class") {
        c.textContent = (schedule[today] || [])[classIndex] || "-";
        classIndex++;
    } else if (b.type === "lunch") {
        c.innerHTML = '<span class="lunchText">LUNCH</span>';
    } else if (b.type === "prep") {
        c.textContent = "Class Prep";
        c.classList.add("prepPeriod");
    }
    row.appendChild(p); row.appendChild(c);
    tableElem.appendChild(row);
  });
}

const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");
function toMin(t){let[h,m]=t.split(":"); return parseInt(h)*60+parseInt(m);}

let pulseGlow = 0;
let pulseDir = 1;

function drawClock(){
    let now = new Date();
    let mins = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;
    ctx.clearRect(0,0,300,300);
    
    // Background
    ctx.beginPath(); ctx.arc(150,150,133,0,Math.PI*2); ctx.fillStyle="#1f3a5f"; ctx.fill();

    // Ticks
    for(let i=0;i<60;i++){
        let angle=i*Math.PI/30; 
        let isMajor = i % 5 === 0;
        let len = isMajor ? 14 : 6;
        let x1=150+Math.cos(angle)*(125-len); let y1=150+Math.sin(angle)*(125-len);
        let x2=150+Math.cos(angle)*125; let y2=150+Math.sin(angle)*125;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
        ctx.strokeStyle="white"; ctx.lineWidth = isMajor ? 3 : 1; 
        ctx.lineCap = "round"; ctx.stroke();
    }
  
    let label = "Free Time"; 
    let color = "#888"; 
    let total = 0; 
    let remain = 0;

    if (blocks && !isWeekendView) {
        let active = blocks.find(b => mins >= toMin(b.start) && mins < toMin(b.end));
        if(active){
            label = active.label;
            if(active.type === "class") color = "#ff3c3c";
            else if(active.type === "break") color = "#4696ff";
            else if(active.type === "lunch") color = "#ffcc00";
            else color = "#20b2aa"; // prep

            total = toMin(active.end) - toMin(active.start);
            remain = toMin(active.end) - mins;
        } else {
            let nextBlock = blocks.find(b => mins < toMin(b.start));
            if(nextBlock){
                label = `Next: ${nextBlock.label}`; 
                color = "#9cc9ff";
                let lastBlock = [...blocks].reverse().find(b => mins >= toMin(b.end));
                let startOfGap = lastBlock ? toMin(lastBlock.end) : toMin("08:30");
                total = toMin(nextBlock.start) - startOfGap;
                remain = toMin(nextBlock.start) - mins;
            }
        }
    } else {
        color = "#00d4ff"; label = "WEEKEND FREEDOM";
        total = 1440; remain = 1440;
    }

    // DRAW RING
    if(total > 0){
        let percent = Math.max(0, Math.min(1, remain / total));
        pulseGlow += 0.4 * pulseDir;
        if(pulseGlow > 16 || pulseGlow < 0) pulseDir *= -1;

        ctx.save();
        ctx.beginPath(); ctx.arc(150,150,138,0,Math.PI*2);
        ctx.strokeStyle = color; ctx.globalAlpha = 0.1; ctx.lineWidth = 10; ctx.stroke();
        ctx.globalAlpha = 1.0;
        ctx.beginPath(); 
        ctx.arc(150,150,138, -Math.PI/2, -Math.PI/2 + (percent * 2 * Math.PI), false);
        ctx.lineWidth = 12; ctx.strokeStyle = color; ctx.lineCap = "round";
        ctx.shadowBlur = pulseGlow; ctx.shadowColor = color; ctx.stroke();
        ctx.restore();
    }

    // Digital Time
    let h = now.getHours(); let m = now.getMinutes().toString().padStart(2,"0"); let s = now.getSeconds().toString().padStart(2,"0");
    let ampm = h >= 12 ? "PM" : "AM"; h = h % 12 || 12;
    ctx.fillStyle="white"; ctx.font="bold 28px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(`${h}:${m}:${s} ${ampm}`, 150, 150);

    document.getElementById("periodLabel").textContent = label;
    document.getElementById("periodLabel").style.color = color;

    // Table Highlighting
    document.querySelectorAll("#scheduleTable tr").forEach(row=>{
        const start=row.dataset.start; const end=row.dataset.end;
        if(start && end) {
            const isCurrent = (mins >= toMin(start) && mins < toMin(end));
            row.classList.toggle("currentClass", isCurrent);
        }
    });
}
setInterval(drawClock, 50); 

function startEmojiRain() {
  setInterval(() => {
    const cur = new Date(); const day = cur.getDay(); const hr = cur.getHours();
    const minsNow = hr * 60 + cur.getMinutes(); 
    let mode = "OFF";
    if (day === 5 && minsNow >= (16*60+30)) mode = "WEEKEND";
    else if (day === 6) mode = "WEEKEND";
    else if (day === 0) mode = (hr >= 21) ? "POO" : "WEEKEND";
    if (mode === "OFF") return;

    let emojis = ['🎉', '✨', '🎊', '🥳']; 
    if (mode === "POO") emojis = ['💩', '😭'];
    else {
        if (currentCondition === "Rain" || currentCondition === "Drizzle") emojis = ['☔', '💧', '☁️', '🐸'];
        else if (currentCondition === "Snow") emojis = ['❄️', '⛄', '🤍', '🌬️'];
    }
    const e = document.createElement('div');
    e.className = 'falling-emoji';
    e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    e.style.left = Math.random() * 100 + 'vw';
    e.style.animationDuration = (Math.random() * 3 + 2) + 's';
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 5000);
  }, 350);
}
startEmojiRain();

async function loadWeather(){
try{
    const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
    const geoData=await geoRes.json();
    const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${geoData[0].lat}&lon=${geoData[0].lon}&appid=${API_KEY}&units=metric`);
    const data=await res.json();
    currentCondition = data.weather[0].main; 
    const weatherDetails = {
        "Clear": { emoji: "☀️", text: "Clear" }, "Clouds": { emoji: "☁️", text: "Cloudy" },
        "Rain": { emoji: "🌧️", text: "Rainy" }, "Drizzle": { emoji: "🌦️", text: "Drizzle" },
        "Thunderstorm": { emoji: "⛈️", text: "Stormy" }, "Snow": { emoji: "❄️", text: "Snowy" },
        "Mist": { emoji: "🌫️", text: "Misty" }
    };
    const current = weatherDetails[data.weather[0].main] || { emoji: "✨", text: data.weather[0].main };
    document.getElementById("weather").textContent=`${current.emoji} Weather: ${current.text} / ${data.main.temp.toFixed(1)}°C`;
}catch{ document.getElementById("weather").textContent="Weather Unavailable"; }
}
loadWeather();

async function loadAir(){
try{
    const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
    const geoData=await geoRes.json();
    const res=await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${geoData[0].lat}&lon=${geoData[0].lon}&appid=${API_KEY}`);
    const data=await res.json();
    const levels=["Good 😊","Fair 🙂","Moderate 😐","Poor 😷","Very Poor ☠️"];
    document.getElementById("air").textContent=`😷 Air Quality: ${levels[data.list[0].main.aqi-1]}`;
}catch{ document.getElementById("air").textContent="Air Quality Unavailable"; }
}
loadAir();

const weekPopup=document.getElementById("weekPopup");
document.getElementById("today").onclick=()=>{ weekPopup.style.display="flex"; }
weekPopup.onclick=()=>{ weekPopup.style.display="none"; }
</script>
</body>
</html>
