<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Dashboard</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#eef2f7,#dfe6f0);
display:flex;
justify-content:center;
}

.container{
max-width:420px;
width:100%;
padding:15px;
}

.card{
background:white;
border-radius:16px;
padding:16px;
margin-bottom:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

h2{
margin:0 0 10px 0;
font-size:20px;
}

#clockTitle{
text-align:center;
font-size:18px;
margin-bottom:8px;
font-weight:bold;
}

canvas{
display:block;
margin:auto;
}

#digital{
text-align:center;
font-size:28px;
margin-top:10px;
font-family:monospace;
}

.weatherRow{
display:flex;
justify-content:space-between;
font-size:18px;
}

.airBox{
display:flex;
justify-content:space-between;
margin-top:6px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:6px;
border-bottom:1px solid #eee;
}

.small{
font-size:14px;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div id="clockTitle">Loading...</div>

<canvas id="clock" width="260" height="260"></canvas>

<div id="digital"></div>

</div>


<div class="card">

<h2>Weather</h2>

<div class="weatherRow">
<div id="temp">--°C</div>
<div id="weather">--</div>
</div>

<div class="small" id="humidity"></div>

</div>


<div class="card">

<h2>Air Quality</h2>

<div class="airBox">
<div>PM2.5</div>
<div id="pm25">--</div>
</div>

<div class="airBox">
<div>PM10</div>
<div id="pm10">--</div>
</div>

</div>


<div class="card">

<h2>Weekly Classes</h2>

<table id="scheduleTable"></table>

</div>

</div>


<script>

// ============================
// SETTINGS
// ============================

const API_KEY="fa9fe37b9be14839fe6774643939e974"

const lat=36.893
const lon=126.629

// ============================
// CLASS SCHEDULE
// ============================

const schedule={
Monday:[null,"6-4","6-3","6-1","6-2",null],
Tuesday:["Unavailable","Unavailable","Unavailable","Unavailable","Unavailable","Unavailable"],
Wednesday:[null,"6-5","6-6","6-7","6-8",null],
Thursday:["5-6","5-5","5-4","5-1","5-2",null],
Friday:["5-3","5-7","5-8","5-9",null,null]
}

// ============================
// TIME BLOCKS
// ============================

const timeBlocks={
Monday:[
{type:"class",label:"1st Period",start:"09:00",end:"09:40"},
{type:"break",start:"09:40",end:"09:50"},
{type:"class",label:"2nd Period",start:"09:50",end:"10:30"},
{type:"break",start:"10:30",end:"10:40"},
{type:"class",label:"3rd Period",start:"10:40",end:"11:20"},
{type:"lunch",label:"Lunch",start:"11:20",end:"12:20"},
{type:"class",label:"4th Period",start:"12:20",end:"13:00"},
{type:"break",start:"13:00",end:"13:10"},
{type:"class",label:"5th Period",start:"13:10",end:"13:50"},
{type:"break",start:"13:50",end:"14:00"},
{type:"class",label:"6th Period",start:"14:00",end:"14:40"}
],

Wednesday:[
{type:"class",label:"1st Period",start:"09:00",end:"09:40"},
{type:"break",start:"09:40",end:"09:50"},
{type:"class",label:"2nd Period",start:"09:50",end:"10:30"},
{type:"break",start:"10:30",end:"10:40"},
{type:"class",label:"3rd Period",start:"10:40",end:"11:20"},
{type:"lunch",label:"Lunch",start:"11:20",end:"12:20"},
{type:"class",label:"4th Period",start:"12:20",end:"13:00"},
{type:"break",start:"13:00",end:"13:10"},
{type:"class",label:"5th Period",start:"13:10",end:"13:50"},
{type:"break",start:"13:50",end:"14:00"},
{type:"class",label:"6th Period",start:"14:00",end:"14:40"}
],

Thursday:[
{type:"class",label:"1st Period",start:"09:00",end:"09:40"},
{type:"break",start:"09:40",end:"09:50"},
{type:"class",label:"2nd Period",start:"09:50",end:"10:30"},
{type:"break",start:"10:30",end:"10:40"},
{type:"class",label:"3rd Period",start:"10:40",end:"11:20"},
{type:"break",start:"11:20",end:"12:20"},
{type:"class",label:"4th Period",start:"12:20",end:"13:00"},
{type:"lunch",label:"Lunch",start:"13:00",end:"13:10"},
{type:"class",label:"5th Period",start:"13:10",end:"13:50"},
{type:"break",start:"13:50",end:"14:00"},
{type:"class",label:"6th Period",start:"14:00",end:"14:40"}
],

Friday:[
{type:"class",label:"1st Period",start:"09:00",end:"09:40"},
{type:"break",start:"09:40",end:"09:50"},
{type:"class",label:"2nd Period",start:"09:50",end:"10:30"},
{type:"break",start:"10:30",end:"10:40"},
{type:"class",label:"3rd Period",start:"10:40",end:"11:20"},
{type:"break",start:"11:20",end:"12:20"},
{type:"class",label:"4th Period",start:"12:20",end:"13:00"},
{type:"lunch",label:"Lunch",start:"13:00",end:"13:10"},
{type:"class",label:"5th Period",start:"13:10",end:"13:50"},
{type:"break",start:"13:50",end:"14:00"},
{type:"class",label:"6th Period",start:"14:00",end:"14:40"}
]
}

// ============================
// HELPER
// ============================

function toMinutes(t){
let [h,m]=t.split(":")
return h*60+ +m
}

// ============================
// CLOCK
// ============================

const canvas=document.getElementById("clock")
const ctx=canvas.getContext("2d")

function drawClock(){

let now=new Date()

let h=now.getHours()
let m=now.getMinutes()
let s=now.getSeconds()

let nowMin=h*60+m+s/60

ctx.clearRect(0,0,260,260)

ctx.beginPath()
ctx.arc(130,130,120,0,Math.PI*2)
ctx.fillStyle="black"
ctx.fill()

let day=now.toLocaleDateString("en-US",{weekday:"long"})

let blocks=timeBlocks[day]

let active=null

if(blocks){

for(let b of blocks){

let start=toMinutes(b.start)
let end=toMinutes(b.end)

if(nowMin>=start && nowMin<=end){

active=b
break

}

}

}

if(active){

document.getElementById("clockTitle").innerText=active.label

let total=toMinutes(active.end)-toMinutes(active.start)
let remain=toMinutes(active.end)-nowMin
let percent=remain/total

let endAngle=-Math.PI/2 + percent*(Math.PI*2)

let color="blue"

if(active.type==="class")color="red"
if(active.type==="lunch")color="yellow"

ctx.beginPath()
ctx.arc(130,130,100,-Math.PI/2,endAngle)

ctx.strokeStyle=color
ctx.lineWidth=12
ctx.stroke()

}

let timeString=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")

document.getElementById("digital").innerText=timeString

}

setInterval(drawClock,1000)


// ============================
// WEATHER
// ============================

fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`)
.then(res=>res.json())
.then(data=>{

document.getElementById("temp").innerText=Math.round(data.main.temp)+"°C"

document.getElementById("weather").innerText=data.weather[0].main

document.getElementById("humidity").innerText="Humidity "+data.main.humidity+"%"

})


// ============================
// AIR QUALITY
// ============================

fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`)
.then(res=>res.json())
.then(data=>{

document.getElementById("pm25").innerText=data.list[0].components.pm2_5

document.getElementById("pm10").innerText=data.list[0].components.pm10

})


// ============================
// WEEK TABLE
// ============================

let table=document.getElementById("scheduleTable")

for(let day in schedule){

let row=document.createElement("tr")

let c1=document.createElement("td")
c1.innerText=day

let c2=document.createElement("td")
c2.innerText=schedule[day].join(" / ")

row.appendChild(c1)
row.appendChild(c2)

table.appendChild(row)

}

</script>

</body>
</html>
