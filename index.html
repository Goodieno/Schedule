<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Clock</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#111;
color:white;
text-align:center;
}

#clockContainer{
position:relative;
width:320px;
height:320px;
margin:40px auto;
}

canvas{
position:absolute;
top:0;
left:0;
}

#digitalClock{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
font-weight:bold;
color:white;
}

#periodLabel{
margin-top:10px;
font-size:20px;
font-weight:bold;
}

#weather{
margin-top:15px;
font-size:18px;
}

#schedule{
width:90%;
margin:30px auto;
border-collapse:collapse;
}

#schedule td,#schedule th{
border:1px solid #444;
padding:10px;
}

.current{
background:red;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.popupContent{
background:#222;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="clockContainer">
<canvas id="clock" width="320" height="320"></canvas>
<div id="digitalClock"></div>
</div>

<div id="periodLabel"></div>

<div id="weather">
<b>🌤 Weather</b> <span id="weatherText">Loading...</span><br>
<b>😷 Air Quality</b> <span id="airText">Loading...</span>
</div>

<table id="schedule">
<tr><th>Period</th><th>Time</th></tr>
<tr data-start="09:00" data-end="09:45"><td>1교시</td><td>09:00-09:45</td></tr>
<tr data-start="09:55" data-end="10:40"><td>2교시</td><td>09:55-10:40</td></tr>
<tr data-start="10:50" data-end="11:35"><td>3교시</td><td>10:50-11:35</td></tr>
<tr data-start="11:35" data-end="12:20"><td>점심</td><td>11:35-12:20</td></tr>
<tr data-start="12:20" data-end="13:05"><td>4교시</td><td>12:20-13:05</td></tr>
<tr data-start="13:15" data-end="14:00"><td>5교시</td><td>13:15-14:00</td></tr>
<tr data-start="14:10" data-end="14:55"><td>6교시</td><td>14:10-14:55</td></tr>
</table>

<script>

const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");
const radius=150;

const rows=document.querySelectorAll("#schedule tr[data-start]");

function drawClock(){

ctx.clearRect(0,0,320,320);

const now=new Date();

let h=now.getHours();
let m=now.getMinutes();
let s=now.getSeconds();

let displayH=h%12||12;

document.getElementById("digitalClock").innerText=
displayH.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")+" "+
(h>=12?"PM":"AM");

drawTicks();

let currentEvent="Free time";
let color="grey";

rows.forEach(row=>{

const start=row.dataset.start.split(":");
const end=row.dataset.end.split(":");

let startTime=new Date();
startTime.setHours(start[0],start[1],0);

let endTime=new Date();
endTime.setHours(end[0],end[1],0);

row.classList.remove("current");

if(now>=startTime && now<=endTime){

row.classList.add("current");

currentEvent=row.children[0].innerText;

if(currentEvent==="점심"){
color="yellow";
}else{
color="red";
}

let total=endTime-startTime;
let remain=endTime-now;

let angle=(remain/total)*2*Math.PI;

drawCountdown(angle,color);

}

});

document.getElementById("periodLabel").innerText=currentEvent;

}

function drawTicks(){

ctx.save();
ctx.translate(160,160);

for(let i=0;i<60;i++){

ctx.rotate(Math.PI/30);

ctx.beginPath();

ctx.moveTo(0,-radius);

if(i%5===0){
ctx.lineTo(0,-radius+15);
}else{
ctx.lineTo(0,-radius+7);
}

ctx.strokeStyle="white";
ctx.lineWidth=2;
ctx.stroke();

}

ctx.restore();

}

function drawCountdown(angle,color){

ctx.beginPath();

ctx.arc(160,160,130,-Math.PI/2,-Math.PI/2+angle);

ctx.strokeStyle=color;
ctx.lineWidth=10;

ctx.shadowColor=color;
ctx.shadowBlur=20;

ctx.stroke();

}

setInterval(drawClock,1000);

drawClock();

</script>

</body>
</html>
