<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Timer</title>

<style>

/* ================= THEME ================= */

body{
background:#0b1626;
font-family:Arial;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h2{
margin:10px 0;
}

/* ================= CLOCK ================= */

#clockBox{
margin:auto;
width:320px;
}

canvas{
background:#1f3a5f;
border-radius:50%;
box-shadow:0 0 20px rgba(0,140,255,.4);
}

/* ================= GLOW ================= */

@keyframes pulse{
0%{box-shadow:0 0 10px rgba(0,140,255,.3);}
50%{box-shadow:0 0 30px rgba(0,140,255,.9);}
100%{box-shadow:0 0 10px rgba(0,140,255,.3);}
}

.activeGlow{
animation:pulse 2s infinite;
}

/* ================= STATUS ================= */

#currentStatus{
margin-top:10px;
font-size:22px;
font-weight:bold;
}

/* ================= INFO ================= */

#info{
margin-top:20px;
font-size:18px;
}

#weather{
font-weight:bold;
margin-top:5px;
}

#air{
font-weight:bold;
margin-top:5px;
}

/* ================= SCHEDULE ================= */

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
width:95%;
max-width:400px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

th{
color:#9cc9ff;
}

/* ================= CURRENT ROW ================= */

.currentClass{
background:rgba(255,0,0,0.25);
font-weight:bold;
border-left:4px solid red;
}

.currentBreak{
background:rgba(0,150,255,0.25);
border-left:4px solid #3aa6ff;
}

.currentLunch{
background:rgba(255,230,0,0.25);
border-left:4px solid #ffd900;
}

</style>
</head>

<body>

<h2 id="today"></h2>

<div id="clockBox">
<canvas id="clock" width="300" height="300"></canvas>
</div>

<div id="currentStatus"></div>

<div id="info">

<div id="weather">🌤 Weather</div>

<div id="air">😷 Air Quality</div>

</div>

<table id="scheduleTable">
<tr>
<th>Period</th>
<th>Class</th>
</tr>
</table>

<script>

/* ================= API ================= */

const API_KEY="fa9fe37b9be14839fe6774643939e974";

/* ================= SCHEDULE ================= */

const schedule={
Monday:[null,"6-4 English","6-3 English","6-1 English","6-2 English",null],
Tuesday:["Unavailable","Unavailable","Unavailable","Unavailable","Unavailable","Unavailable"],
Wednesday:[null,"6-5 English","6-6 English","6-7 English","6-8 English",null],
Thursday:["5-6 English","5-5 English","5-4 English","5-1 English","5-2 English",null],
Friday:["5-3 English","5-7 English","5-8 English","5-9 English",null,null]
};

/* ================= DAY BLOCKS ================= */

const dayBlocks={

Monday:[
{type:"class",label:"1st",start:"09:00",end:"09:40"},
{type:"break",start:"09:40",end:"09:50"},
{type:"class",label:"2nd",start:"09:50",end:"10:30"},
{type:"break",start:"10:30",end:"10:40"},
{type:"class",label:"3rd",start:"10:40",end:"11:20"},
{type:"lunch",start:"11:20",end:"12:20"},
{type:"class",label:"4th",start:"12:20",end:"13:00"},
{type:"break",start:"13:00",end:"13:10"},
{type:"class",label:"5th",start:"13:10",end:"13:50"},
{type:"break",start:"13:50",end:"14:00"},
{type:"class",label:"6th",start:"14:00",end:"14:40"}
],

Wednesday:[
{type:"class",label:"1st",start:"09:00",end:"09:40"},
{type:"break",start:"09:40",end:"09:50"},
{type:"class",label:"2nd",start:"09:50",end:"10:30"},
{type:"break",start:"10:30",end:"10:40"},
{type:"class",label:"3rd",start:"10:40",end:"11:20"},
{type:"lunch",start:"11:20",end:"12:20"},
{type:"class",label:"4th",start:"12:20",end:"13:00"},
{type:"break",start:"13:00",end:"13:10"},
{type:"class",label:"5th",start:"13:10",end:"13:50"},
{type:"break",start:"13:50",end:"14:00"},
{type:"class",label:"6th",start:"14:00",end:"14:40"}
],

Thursday:[
{type:"class",label:"1st",start:"09:00",end:"09:40"},
{type:"break",start:"09:40",end:"09:50"},
{type:"class",label:"2nd",start:"09:50",end:"10:30"},
{type:"break",start:"10:30",end:"10:40"},
{type:"class",label:"3rd",start:"10:40",end:"11:20"},
{type:"class",label:"4th",start:"12:20",end:"13:00"},
{type:"lunch",start:"13:00",end:"13:10"},
{type:"class",label:"5th",start:"13:10",end:"13:50"},
{type:"break",start:"13:50",end:"14:00"},
{type:"class",label:"6th",start:"14:00",end:"14:40"}
],

Friday:[
{type:"class",label:"1st",start:"09:00",end:"09:40"},
{type:"break",start:"09:40",end:"09:50"},
{type:"class",label:"2nd",start:"09:50",end:"10:30"},
{type:"break",start:"10:30",end:"10:40"},
{type:"class",label:"3rd",start:"10:40",end:"11:20"},
{type:"class",label:"4th",start:"12:20",end:"13:00"},
{type:"lunch",start:"13:00",end:"13:10"},
{type:"class",label:"5th",start:"13:10",end:"13:50"},
{type:"break",start:"13:50",end:"14:00"},
{type:"class",label:"6th",start:"14:00",end:"14:40"}
]

};

/* ================= DATE ================= */

const now=new Date();
const today=now.toLocaleDateString("en-US",{weekday:"long"});
document.getElementById("today").textContent=today;

/* ================= BUILD SCHEDULE TABLE ================= */

const table=document.getElementById("scheduleTable");

(schedule[today]||[]).forEach((cls,i)=>{
let row=document.createElement("tr");

let p=document.createElement("td");
p.textContent=(i+1)+"교시";

let c=document.createElement("td");
c.textContent=cls||"-";

row.appendChild(p);
row.appendChild(c);

table.appendChild(row);
});

/* ================= CLOCK ================= */

const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");

function toMin(t){
let[h,m]=t.split(":");
return h*60+ +m;
}

function drawClock(){

let now=new Date();
let mins=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;

ctx.clearRect(0,0,300,300);

/* face */

ctx.beginPath();
ctx.arc(150,150,140,0,Math.PI*2);
ctx.fillStyle="#1f3a5f";
ctx.fill();

/* ticks */

for(let i=0;i<60;i++){

let angle=i*Math.PI/30;

let len=i%5==0?15:7;

let x1=150+Math.cos(angle)*(120-len);
let y1=150+Math.sin(angle)*(120-len);

let x2=150+Math.cos(angle)*120;
let y2=150+Math.sin(angle)*120;

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.strokeStyle="white";
ctx.lineWidth=i%5==0?3:1;
ctx.stroke();

}

/* digital clock */

let h=now.getHours();
let m=now.getMinutes();
let s=now.getSeconds();

let ampm=h>=12?"PM":"AM";
h=h%12;
if(h===0)h=12;

m=m.toString().padStart(2,"0");
s=s.toString().padStart(2,"0");

ctx.fillStyle="white";
ctx.font="28px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(`${h}:${m}:${s} ${ampm}`,150,150);

/* active block */

let blocks=dayBlocks[today]||[];
let active=null;

for(let b of blocks){

let s=toMin(b.start);
let e=toMin(b.end);

if(mins>=s&&mins<=e){
active=b;
break;
}

}

let statusText="Free Time";
let statusColor="gray";

/* highlight schedule */

let rows=document.querySelectorAll("#scheduleTable tr");

rows.forEach(r=>r.classList.remove("currentClass","currentBreak","currentLunch"));

if(active){

let color="red";

if(active.type=="break")color="blue";
if(active.type=="lunch")color="yellow";

let total=toMin(active.end)-toMin(active.start);
let remain=toMin(active.end)-mins;

let percent=remain/total;

let end=-Math.PI/2+percent*2*Math.PI;

ctx.beginPath();
ctx.arc(150,150,105,-Math.PI/2,end);
ctx.lineWidth=6;
ctx.strokeStyle=color;
ctx.stroke();

if(active.type==="class"){
statusText=active.label+"교시";
statusColor="red";

let rowIndex=parseInt(active.label)-1;
if(rows[rowIndex+1]) rows[rowIndex+1].classList.add("currentClass");
}

if(active.type==="break"){
statusText="Break Time";
statusColor="#3aa6ff";
}

if(active.type==="lunch"){
statusText="Lunch Time";
statusColor="#ffd900";
}

}

document.getElementById("currentStatus").textContent=statusText;
document.getElementById("currentStatus").style.color=statusColor;

}

setInterval(drawClock,1000);

/* ================= WEATHER ================= */

async function loadWeather(){

try{

const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
const geoData=await geoRes.json();

const lat=geoData[0].lat;
const lon=geoData[0].lon;

const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`);
const data=await res.json();

document.getElementById("weather").textContent=
`🌤 Weather: ${data.weather[0].main} / ${data.main.temp.toFixed(1)}°C`;

}catch{

document.getElementById("weather").textContent="Weather Unavailable";

}

}

/* ================= AIR ================= */

async function loadAir(){

try{

const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
const geoData=await geoRes.json();

const lat=geoData[0].lat;
const lon=geoData[0].lon;

const res=await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`);
const data=await res.json();

const aqi=data.list[0].main.aqi;

const levels=["Good 😊","Fair 🙂","Moderate 😐","Poor 😷","Very Poor ☠️"];

document.getElementById("air").textContent=
`😷 Air Quality: ${levels[aqi-1]}`;

}catch{

document.getElementById("air").textContent="Air Quality Unavailable";

}

}

loadWeather();
loadAir();

</script>

</body>
</html>
