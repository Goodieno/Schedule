<script>

/* ================= API ================= */

const API_KEY="fa9fe37b9be14839fe6774643939e974";

/* ================= SCHEDULE ================= */

const schedule={
  Monday:[null,"6-4 English","6-3 English","6-1 English","6-2 English",null],
  Tuesday:["Unavailable","Unavailable","Unavailable","Unavailable","Unavailable","Unavailable"],
  Wednesday:[null,"6-5 English","6-6 English","6-7 English","6-8 English",null],
  Thursday:["5-6 English","5-5 English","5-4 English","5-1 English","5-2 English",null],
  Friday:["5-3 English","5-7 English","5-8 English","5-9 English",null,null]
};

/* ================= DATE ================= */

const now=new Date();
const today=now.toLocaleDateString("en-US",{weekday:"long"});
document.getElementById("today").textContent=today;

/* ================= BUILD TABLE ================= */

const table=document.getElementById("scheduleTable");

const blocks=[
  {type:"class",label:"1교시",start:"09:00",end:"09:40"},
  {type:"break",label:"쉬는시간",start:"09:40",end:"09:50"},
  {type:"class",label:"2교시",start:"09:50",end:"10:30"},
  {type:"break",label:"쉬는시간",start:"10:30",end:"10:40"},
  {type:"class",label:"3교시",start:"10:40",end:"11:20"},
  {type:"lunch",label:"점심시간",start:"11:20",end:"12:20"},
  {type:"class",label:"4교시",start:"12:20",end:"13:00"},
  {type:"break",label:"쉬는시간",start:"13:00",end:"13:10"},
  {type:"class",label:"5교시",start:"13:10",end:"13:50"},
  {type:"break",label:"쉬는시간",start:"13:50",end:"14:00"},
  {type:"class",label:"6교시",start:"14:00",end:"14:40"}
];

let classIdx = 0;

blocks.forEach((b) => {

  if (b.type === "break") return;

  let row = document.createElement("tr");

  let p = document.createElement("td");
  p.textContent = b.label;

  let c = document.createElement("td");

  if (b.type === "class") {
    c.textContent = (schedule[today] || [])[classIdx] || "-";
    classIdx++;
  }

  if (b.type === "lunch") {
    c.innerHTML = '<span class="lunchText">LUNCH</span>';
  }

  row.appendChild(p);
  row.appendChild(c);
  table.appendChild(row);

});

/* ================= CLOCK ================= */

const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");
const weekPopup = document.getElementById("weekPopup");

function toMin(t){
  const parts = t.split(":");
  const h = parseInt(parts[0], 10);
  const m = parseInt(parts[1], 10);
  return h * 60 + m;
}

function highlightSchedule(label,type){

  document.querySelectorAll("#scheduleTable tr").forEach(r=>{
    r.classList.remove("activeRowClass","activeRowLunch");
  });

  document.querySelectorAll("#scheduleTable tr").forEach(r=>{

    let td=r.querySelector("td");

    if(td && td.textContent===label){

      if(type==="class") r.classList.add("activeRowClass");
      if(type==="lunch") r.classList.add("activeRowLunch");

    }

  });

}

function drawClock(){

  let now=new Date();
  let mins=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;

  ctx.clearRect(0,0,300,300);

  /* clock face */

  ctx.beginPath();
  ctx.arc(150,150,140,0,Math.PI*2);
  ctx.fillStyle="#1f3a5f";
  ctx.fill();

  /* ticks */

  for(let i=0;i<60;i++){

    let angle=i*Math.PI/30;
    let len=i%5==0?15:7;

    let x1=150+Math.cos(angle)*(120-len);
    let y1=150+Math.sin(angle)*(120-len);

    let x2=150+Math.cos(angle)*120;
    let y2=150+Math.sin(angle)*120;

    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.strokeStyle="white";
    ctx.lineWidth=i%5==0?3:1;
    ctx.stroke();

  }

  /* active block */

  let active=null;

  for(let b of blocks){

    let s=toMin(b.start);
    let e=toMin(b.end);

    if(mins>=s && mins<=e){
      active=b;
      break;
    }

  }

  let label="Free Time";
  let color="grey";

  if(active){

    label=active.label;

    if(active.type==="class") color="red";
    if(active.type==="break") color="blue";
    if(active.type==="lunch") color="yellow";

    highlightSchedule(active.label,active.type);

  }

  /* countdown arc */

  if(active){

    let total=toMin(active.end)-toMin(active.start);
    let remain=toMin(active.end)-mins;

    let percent=remain/total;

    let end=-Math.PI/2+percent*2*Math.PI;

    ctx.beginPath();
    ctx.arc(150,150,105,-Math.PI/2,end);

    let pulse=6+Math.sin(Date.now()/200)*2;

    ctx.lineWidth=pulse;
    ctx.strokeStyle=color;
    ctx.stroke();

  }

  /* DIGITAL CLOCK */

  let h=now.getHours();
  let m=now.getMinutes().toString().padStart(2,"0");
  let s=now.getSeconds().toString().padStart(2,"0");

  let ampm=h>=12?"PM":"AM";
  h=h%12;
  if(h==0)h=12;

  ctx.fillStyle="white";
  ctx.font="28px Arial";
  ctx.textAlign="center";
  ctx.textBaseline="middle";

  ctx.fillText(`${h}:${m}:${s} ${ampm}`,150,150);

  document.getElementById("periodLabel").textContent=label;
  document.getElementById("periodLabel").style.color=color;

}

setInterval(drawClock,1000);

/* ================= WEATHER ================= */

async function loadWeather(){

  try{

    const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
    const geoData=await geoRes.json();

    const lat=geoData[0].lat;
    const lon=geoData[0].lon;

    const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`);

    const data=await res.json();

    document.getElementById("weather").textContent=
    `🌤 Weather: ${data.weather[0].main} / ${data.main.temp.toFixed(1)}°C`;

  }catch{

    document.getElementById("weather").textContent="Weather Unavailable";

  }

}

/* ================= AIR ================= */

async function loadAir(){

  try{

    const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
    const geoData=await geoRes.json();

    const lat=geoData[0].lat;
    const lon=geoData[0].lon;

    const res=await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`);

    const data=await res.json();

    const aqi=data.list[0].main.aqi;

    const levels=["Good 😊","Fair 🙂","Moderate 😐","Poor 😷","Very Poor ☠️"];

    document.getElementById("air").textContent=`😷 Air Quality: ${levels[aqi-1]}`;

  }catch{

    document.getElementById("air").textContent="Air Quality Unavailable";

  }

}

loadWeather();
loadAir();

/* ================= POPUP ================= */

document.getElementById("today").onclick=()=>{
  weekPopup.style.display="flex";
}

weekPopup.onclick=()=>{
  weekPopup.style.display="none";
}

</script>
