<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Schedule</title>

<style>

body{
background:#0b1624;
color:white;
font-family:Arial,Helvetica,sans-serif;
text-align:center;
margin:0;
padding:20px;
}

/* CLOCK */

.clock-container{
display:flex;
justify-content:center;
margin-top:10px;
}

canvas{
background:#1c2f45;
border-radius:50%;
}

/* pulse */

@keyframes pulse{
0%{box-shadow:0 0 5px currentColor;}
50%{box-shadow:0 0 40px currentColor;}
100%{box-shadow:0 0 5px currentColor;}
}

.pulse{
animation:pulse 1.5s infinite;
border-radius:50%;
}

/* WEATHER */

.info{
margin-top:20px;
font-size:18px;
}

.info span{
font-weight:bold;
}

/* SCHEDULE */

.schedule{
margin-top:20px;
background:#122033;
border-radius:12px;
padding:15px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.lunch{
color:#ffd900;
font-weight:bold;
}

.unavailable{
color:#999;
}

</style>
</head>

<body>

<h2 id="dayLabel"></h2>

<div class="clock-container">
<canvas id="clock" width="280" height="280"></canvas>
</div>

<div class="info">
<div><span>🌤 Weather:</span> <span id="weather">Loading...</span></div>
<div><span>😷 Air Quality:</span> <span id="air">Loading...</span></div>
</div>

<div class="schedule">
<table id="scheduleTable"></table>
</div>

<script>

/* ================= API ================= */

const API_KEY="fa9fe37b9be14839fe6774643939e974";

/* ================= TIME BLOCKS ================= */

const dayBlocks={

Monday:[
{label:"1st",start:"09:00",end:"09:40"},
{label:"2nd",start:"09:50",end:"10:30"},
{label:"3rd",start:"10:40",end:"11:20"},
{label:"Lunch",start:"11:20",end:"12:20",type:"lunch"},
{label:"4th",start:"12:20",end:"13:00"},
{label:"5th",start:"13:10",end:"13:50"},
{label:"6th",start:"14:00",end:"14:40"}
],

Tuesday:[
{label:"Unavailable",start:"00:00",end:"23:59",type:"none"}
],

Wednesday:[
{label:"1st",start:"09:00",end:"09:40"},
{label:"2nd",start:"09:50",end:"10:30"},
{label:"3rd",start:"10:40",end:"11:20"},
{label:"Lunch",start:"11:20",end:"12:20",type:"lunch"},
{label:"4th",start:"12:20",end:"13:00"},
{label:"5th",start:"13:10",end:"13:50"},
{label:"6th",start:"14:00",end:"14:40"}
],

Thursday:[
{label:"1st",start:"09:00",end:"09:40"},
{label:"2nd",start:"09:50",end:"10:30"},
{label:"3rd",start:"10:40",end:"11:20"},
{label:"4th",start:"12:20",end:"13:00"},
{label:"Lunch",start:"13:00",end:"13:10",type:"lunch"},
{label:"5th",start:"13:10",end:"13:50"},
{label:"6th",start:"14:00",end:"14:40"}
],

Friday:[
{label:"1st",start:"09:00",end:"09:40"},
{label:"2nd",start:"09:50",end:"10:30"},
{label:"3rd",start:"10:40",end:"11:20"},
{label:"4th",start:"12:20",end:"13:00"},
{label:"Lunch",start:"13:00",end:"13:10",type:"lunch"},
{label:"5th",start:"13:10",end:"13:50"},
{label:"6th",start:"14:00",end:"14:40"}
]

};

/* ================= UTIL ================= */

function toMinutes(t){
let [h,m]=t.split(":");
return parseInt(h)*60+parseInt(m);
}

/* ================= CLOCK ================= */

const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");
const r=140;

function drawClock(){

let now=new Date();
let today=now.toLocaleDateString("en-US",{weekday:"long"});
document.getElementById("dayLabel").textContent=today;

let blocks=dayBlocks[today]||[];

let minutes=now.getHours()*60+now.getMinutes();
let current=null;

for(let b of blocks){
let s=toMinutes(b.start);
let e=toMinutes(b.end);
if(minutes>=s && minutes<e){current=b;}
}

let ringColor="grey";

if(current){

if(current.type==="lunch") ringColor="yellow";
else if(current.label.includes("Break")) ringColor="blue";
else if(current.type==="none") ringColor="grey";
else ringColor="red";

}

ctx.clearRect(0,0,canvas.width,canvas.height);

/* background */

ctx.beginPath();
ctx.arc(r,r,r-10,0,Math.PI*2);
ctx.fillStyle="#1c2f45";
ctx.fill();

/* ticks */

for(let i=0;i<60;i++){

let ang=i*Math.PI/30;
let len=(i%5===0)?12:6;

ctx.beginPath();
ctx.moveTo(
r+Math.cos(ang)*(r-20),
r+Math.sin(ang)*(r-20)
);
ctx.lineTo(
r+Math.cos(ang)*(r-20-len),
r+Math.sin(ang)*(r-20-len)
);

ctx.strokeStyle="white";
ctx.lineWidth=2;
ctx.stroke();
}

/* countdown ring */

if(current){

let start=toMinutes(current.start);
let end=toMinutes(current.end);

let total=end-start;
let passed=minutes-start+(now.getSeconds()/60);

let percent=passed/total;

ctx.beginPath();
ctx.arc(r,r,r-4,-Math.PI/2,percent*2*Math.PI-Math.PI/2);
ctx.strokeStyle=ringColor;
ctx.lineWidth=6;
ctx.stroke();

}

/* digital time */

let hr=now.getHours()%12||12;
let min=String(now.getMinutes()).padStart(2,"0");
let sec=String(now.getSeconds()).padStart(2,"0");

ctx.fillStyle="white";
ctx.font="28px Arial";
ctx.textAlign="center";
ctx.fillText(`${hr}:${min}:${sec}`,r,r+10);

}

setInterval(drawClock,1000);

/* ================= WEATHER ================= */

async function loadWeather() {

    try {

        const geoRes = await fetch(
            `https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`
        );

        const geoData = await geoRes.json();

        const lat = geoData[0].lat;
        const lon = geoData[0].lon;

        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
        );

        const data = await res.json();

        document.getElementById("weather").textContent =
            `${data.weather[0].main} / ${data.main.temp.toFixed(1)}°C`;

    } catch {

        document.getElementById("weather").textContent =
            "Unavailable";
    }
}

/* ================= AIR ================= */

async function loadAir() {

    try {

        const geoRes = await fetch(
            `https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`
        );

        const geoData = await geoRes.json();

        const lat = geoData[0].lat;
        const lon = geoData[0].lon;

        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`
        );

        const data = await res.json();

        const aqi = data.list[0].main.aqi;

        const levels = [
            "Good 😊",
            "Fair 🙂",
            "Moderate 😐",
            "Poor 😷",
            "Very Poor ☠️"
        ];

        document.getElementById("air").textContent =
            levels[aqi-1];

    } catch {

        document.getElementById("air").textContent =
            "Unavailable";
    }
}

/* ================= SCHEDULE TABLE ================= */

function buildSchedule(){

let today=new Date().toLocaleDateString("en-US",{weekday:"long"});
let blocks=dayBlocks[today]||[];

let html="";

for(let b of blocks){

let cls="";

if(b.type==="lunch") cls="lunch";
if(b.type==="none") cls="unavailable";

html+=`
<tr class="${cls}">
<td>${b.label}</td>
<td>${b.start} - ${b.end}</td>
</tr>
`;

}

document.getElementById("scheduleTable").innerHTML=html;

}

loadWeather();
loadAir();
buildSchedule();

</script>

</body>
</html>
